<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Lab - Composite Function</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f6f8fb;
            color: #263238;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header {
            background: linear-gradient(135deg, #243447, #17212c);
            color: white;
            padding: 15px 0;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.16);
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .pcce-logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-right: 25px;
            border-right: 2px solid rgba(255, 255, 255, 0.18);
        }
        .pcce-logo-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 8px;
            background-color: white;
            padding: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .pcce-logo-text .main {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.2;
        }
        .pcce-logo-text .sub {
            font-size: 12px;
            color: #e3edf7;
            margin-top: 2px;
        }
        .virtual-labs-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .virtual-labs-logo i,
        .virtual-labs-logo span,
        .user-info i {
            color: #4aa3df;
        }
        .virtual-labs-logo i {
            font-size: 32px;
        }
        .virtual-labs-logo h1 {
            font-size: 26px;
            font-weight: 600;
        }
